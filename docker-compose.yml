# Requer .env.production na mesma pasta (segredos; não commitar).
# Opcional: `docker compose --env-file .env.production up -d` se usar variáveis no host.

services:
  postgres:
    image: postgres:16-alpine
    container_name: porthos_postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: porthos_gateway
      POSTGRES_USER: porthos
      # POSTGRES_PASSWORD: obrigatório dentro do .env.production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - porthos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porthos -d porthos_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: porthos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - porthos_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: porthos_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "3333:3333"
    networks:
      - porthos_network

  nginx:
    image: nginx:stable-alpine
    container_name: porthos_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - porthos_network

volumes:
  postgres_data:
  redis_data:

networks:
  porthos_network:
    driver: bridge
