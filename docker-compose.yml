services:
  postgres:
    image: postgres:16-alpine
    container_name: porthos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: porthos_gateway
      POSTGRES_USER: porthos
      POSTGRES_PASSWORD: Guitarra0Natan123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - porthos_network

  redis:
    image: redis:7-alpine
    container_name: porthos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - porthos_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: porthos_app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env.production
    ports:
      - "3333:3333"
    networks:
      - porthos_network

  nginx:
    image: nginx:stable-alpine
    container_name: porthos_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - porthos_network

volumes:
  postgres_data:
  redis_data:

networks:
  porthos_network:
    driver: bridge
